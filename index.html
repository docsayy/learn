<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Learn Medicine</title>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header class="hero">
  <div class="hero-content">
    <h1>Learn Medicine</h1>

    <p class="hero-subtitle">
      High-yield medical reviews, clinical pearls, board preparation, and bedside learning.
      <br>
      By Moh Sayyar, MD
    </p>

    <input
      id="search"
      class="search-input"
      type="text"
      placeholder="Search articles, topics, categories, tags..."
      autocomplete="off"
    >
  </div>
</header>

<main class="home-main">

  <section class="featured-links">
    <a href="coverage/index.html" class="featured-card">
      <span class="featured-label">Reference Tool</span>
      <h2>Antibiotic Coverage Reference</h2>
      <p>Quickly compare antibiotic coverage, routes, renal adjustment, and key clinical notes.</p>
    </a>
  </section>

  <section class="filters-section">
    <div class="categories" id="categories">
      <button class="active" data-cat="all" type="button">All</button>
      <button data-cat="Critical Care" type="button">ICU</button>
      <button data-cat="Infectious Disease" type="button">ID</button>
      <button data-cat="Pulmonary" type="button">Pulmonary</button>
      <button data-cat="Cardiology" type="button">Cardiology</button>
      <button data-cat="Nephrology" type="button">Nephrology</button>
      <button data-cat="Hematology" type="button">Hematology</button>
      <button data-cat="Endocrinology" type="button">Endocrine</button>
      <button data-cat="Gastroenterology" type="button">GI</button>
      <button data-cat="Neurology" type="button">Neuro</button>
      <button data-cat="General Internal Medicine" type="button">General Medicine</button>
    </div>
  </section>

  <section class="articles-section">
    <div class="section-header">
      <h2>Articles</h2>
      <div id="resultCount" class="result-count"></div>
    </div>

    <div id="articles" class="article-grid">
      <!-- Articles generated by assets/js/index.js -->
    </div>

    <div id="emptyState" class="empty-state hidden">
      No articles found.
    </div>
  </section>

</main>

<script src="assets/js/index.js"></script>

</body>
</html>
