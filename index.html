<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Learn Medicine</title>

<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header class="hero">
  <div class="hero-content">
    <h1>Learn Medicine</h1>

    <p class="hero-subtitle">
      High-yield medical reviews, clinical pearls, board preparation, and bedside learning. By Moh Sayyar, MD
    </p>

    <input
      id="search"
      type="text"
      placeholder="Search articles, topics, categories, tags..."
      autocomplete="off"
    >
  </div>
</header>

<main>

  <section class="filters-section">
    <div class="categories" id="categories">
      <button class="active" data-cat="all">All</button>
      <button data-cat="Critical Care">ICU</button>
      <button data-cat="Infectious Disease">ID</button>
      <button data-cat="Pulmonary">Pulmonary</button>
      <button data-cat="Cardiology">Cardiology</button>
      <button data-cat="Nephrology">Nephrology</button>
      <button data-cat="Hematology">Hematology</button>
      <button data-cat="Endocrinology">Endocrine</button>
      <button data-cat="General Internal Medicine">General Medicine</button>
    </div>
  </section>

  <section class="articles-section">
    <div class="section-header">
      <div id="resultCount" class="result-count"></div>
    </div>

    <div id="articles" class="article-grid">
      <!-- Generated by JS -->
    </div>

    <div id="emptyState" class="empty-state hidden">
      No articles found.
    </div>
  </section>

</main>

<script src="assets/js/index.js"></script>

</body>
</html>
